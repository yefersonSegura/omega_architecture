<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" role="img" aria-labelledby="title desc">
  <title id="title">Example Omega observability dashboard</title>
  <desc id="desc">Illustrative metrics: events by category, latency, rate, and flow states. Not live data.</desc>
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="lineStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.07"/>
    </filter>
    <!-- Inset matches chart panel; path y kept ? top+4 so stroke does not bleed past border -->
    <clipPath id="eventsChartClip">
      <rect x="58" y="310" width="704" height="84" rx="8"/>
    </clipPath>
  </defs>

  <rect width="820" height="560" fill="#f1f5f9"/>
  <rect x="28" y="20" width="764" height="520" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- Header (keep clear band below subtitle before any chart) -->
  <text x="52" y="56" font-family="system-ui,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#0f172a">Omega observability</text>
  <text x="52" y="84" font-family="system-ui,Segoe UI,sans-serif" font-size="13" fill="#64748b">Example only / build real charts from inspector, traces, or your telemetry</text>

  <!-- Row 1 titles (below subtitle; extra gap so nothing draws above y=108) -->
  <text x="52" y="122" font-family="system-ui,Segoe UI,sans-serif" font-size="12" font-weight="600" fill="#334155">1. Channel events (1 min)</text>
  <text x="432" y="122" font-family="system-ui,Segoe UI,sans-serif" font-size="12" font-weight="600" fill="#334155">2. Intent to expression (ms)</text>

  <!-- 1. Bars: baseline low enough that value labels sit above bars only, never into header -->
  <g transform="translate(52, 248)">
    <line x1="0" y1="0" x2="340" y2="0" stroke="#e2e8f0"/>
    <!-- shorter bars so tops stay below section-3 title area -->
    <rect x="20" y="-72" width="52" height="72" rx="8" fill="url(#barGrad)"/>
    <rect x="102" y="-96" width="52" height="96" rx="8" fill="url(#barGrad)" opacity="0.95"/>
    <rect x="184" y="-44" width="52" height="44" rx="8" fill="url(#barGrad)" opacity="0.88"/>
    <rect x="266" y="-28" width="52" height="28" rx="8" fill="url(#barGrad)" opacity="0.82"/>
    <!-- values inside bars (no floating numbers into text above) -->
    <text x="46" y="-40" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" font-family="system-ui,sans-serif">38</text>
    <text x="128" y="-52" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" font-family="system-ui,sans-serif">52</text>
    <text x="210" y="-22" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" font-family="system-ui,sans-serif">24</text>
    <text x="292" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff" font-family="system-ui,sans-serif">15</text>
    <text x="46" y="20" text-anchor="middle" font-size="12" fill="#475569" font-family="system-ui,sans-serif">Intents</text>
    <text x="128" y="20" text-anchor="middle" font-size="12" fill="#475569" font-family="system-ui,sans-serif">Agent</text>
    <text x="210" y="20" text-anchor="middle" font-size="12" fill="#475569" font-family="system-ui,sans-serif">Nav</text>
    <text x="292" y="20" text-anchor="middle" font-size="12" fill="#475569" font-family="system-ui,sans-serif">Other</text>
  </g>

  <!-- 2. Latency (track width leaves room for "47 ms" inside card: 432+44+236+margin &lt; ~780) -->
  <g transform="translate(432, 142)">
    <text x="0" y="28" font-size="12" fill="#64748b" font-family="system-ui,sans-serif">p50</text>
    <rect x="44" y="16" width="236" height="18" rx="6" fill="#e0f2fe"/>
    <rect x="44" y="16" width="72" height="18" rx="6" fill="#0ea5e9"/>
    <text x="288" y="30" font-size="12" fill="#0f172a" font-family="system-ui,sans-serif" text-anchor="start">12 ms</text>
    <text x="0" y="68" font-size="12" fill="#64748b" font-family="system-ui,sans-serif">p95</text>
    <rect x="44" y="56" width="236" height="18" rx="6" fill="#ede9fe"/>
    <rect x="44" y="56" width="195" height="18" rx="6" fill="#6366f1"/>
    <text x="288" y="70" font-size="12" fill="#0f172a" font-family="system-ui,sans-serif" text-anchor="start">47 ms</text>
  </g>

  <!-- 3. Events / minute: title first, then chart fully inside clip (no overlap with title) -->
  <text x="52" y="286" font-family="system-ui,Segoe UI,sans-serif" font-size="12" font-weight="600" fill="#334155">3. Events per minute (session excerpt)</text>
  <rect x="52" y="300" width="716" height="102" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <g clip-path="url(#eventsChartClip)">
    <!-- y mapped into [312..388] so peaks stay below panel top + stroke half-width -->
    <polygon fill="#6366f1" fill-opacity="0.1" stroke="none"
      points="72,388 140,361 208,371 276,339 344,348 412,330 480,339 548,321 616,330 684,312 752,325 752,392 72,392"/>
    <polyline fill="none" stroke="url(#lineStroke)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
      points="72,388 140,361 208,371 276,339 344,348 412,330 480,339 548,321 616,330 684,312 752,325"/>
  </g>
  <text x="72" y="394" font-size="10" fill="#94a3b8" font-family="system-ui,sans-serif">start</text>
  <text x="748" y="394" font-size="10" fill="#94a3b8" font-family="system-ui,sans-serif" text-anchor="end">+10 min</text>

  <!-- 4. Active flows -->
  <text x="52" y="432" font-family="system-ui,Segoe UI,sans-serif" font-size="12" font-weight="600" fill="#334155">4. Active flows (snapshot)</text>
  <g transform="translate(52, 446)">
    <rect x="0" y="0" width="132" height="36" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <circle cx="18" cy="18" r="6" fill="#10b981"/>
    <text x="32" y="23" font-size="12" fill="#065f46" font-family="system-ui,sans-serif">auth / running</text>
    <rect x="148" y="0" width="124" height="36" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
    <circle cx="166" cy="18" r="6" fill="#f97316"/>
    <text x="180" y="23" font-size="12" fill="#9a3412" font-family="system-ui,sans-serif">shop / idle</text>
    <rect x="288" y="0" width="148" height="36" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <circle cx="306" cy="18" r="6" fill="#3b82f6"/>
    <text x="320" y="23" font-size="12" fill="#1e40af" font-family="system-ui,sans-serif">profile / sleeping</text>
  </g>

  <text x="52" y="528" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#94a3b8">Not live data / shows the kinds of views the Omega channel + flow model supports.</text>
</svg>
