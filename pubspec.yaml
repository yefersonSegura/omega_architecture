name: omega_architecture
description: "A reactive, agent-based architecture framework for Flutter applications."
version: 0.0.20
repository: https://github.com/yefersonSegura/omega_architecture
homepage: https://github.com/yefersonSegura/omega_architecture
# Documentation: API reference (HTTPS, no penalización). Web completa: http://yefersonsegura.com/proyects/omega/
documentation: https://pub.dev/documentation/omega_architecture/latest
issue_tracker: https://github.com/yefersonSegura/omega_architecture/issues

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  web: ^1.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Para que pub.dev no penalice: la transitiva meta (Flutter) queda en 1.17.0;
# forzamos la última compatible para pasar "Support up-to-date dependencies".
dependency_overrides:
  meta: ^1.18.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

executables:
  omega:
