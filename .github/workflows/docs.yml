# VitePress (docs/) → push static files to branch `gh-pages`.
#
# Omega Angular uses actions/deploy-pages + "Pages source: GitHub Actions" and that works there.
# This repo often hits HttpError 404 on createPagesDeployment when that API is not available for
# the repository (Pages not set to GitHub Actions, org policy, etc.). Publishing via `gh-pages`
# avoids that API entirely — same public URL once Pages points at the branch.
#
# ONE-TIME:
#   Settings → Pages → Source: "Deploy from a branch" → Branch: gh-pages → Folder: / (root)
#   Settings → Actions → General → Workflow permissions: "Read and write" (token must push gh-pages)
#
# VitePress `base` in docs/.vitepress/config.mts must be '/<repo>/' (e.g. /omega_architecture/).
# Do NOT add another workflow that publishes a different Pages artifact to the same site.
name: Deploy documentation

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install & build
        working-directory: docs
        run: |
          npm ci
          npm run build

      - name: Verify dist
        run: test -f docs/.vitepress/dist/index.html

      - name: Push to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/.vitepress/dist
          force_orphan: true
