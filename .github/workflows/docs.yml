# VitePress (docs/) → force-push branch `gh-pages` (GitHub Pages: Deploy from branch → gh-pages → /).
#
# Uses plain `git push` instead of a third-party action so CI logs show the real error if publish fails.
#
# If build succeeds but the site does not update:
#   1. Settings → Actions → General → Workflow permissions → Read and write permissions
#   2. Settings → Pages → Deploy from a branch → gh-pages → / (root)
#   3. Branch protection: allow force-push to gh-pages (this workflow uses git push --force)
#
# VitePress `base` in docs/.vitepress/config.mts must be '/<repo>/' (e.g. /omega_architecture/).
name: Deploy documentation

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install & build
        working-directory: docs
        run: |
          npm ci
          npm run build

      - name: Verify dist
        run: |
          test -f docs/.vitepress/dist/index.html
          echo "Dist size:" && du -sh docs/.vitepress/dist
          echo "Top files:" && ls -la docs/.vitepress/dist | head -25

      - name: Push dist to gh-pages
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          DIST="${GITHUB_WORKSPACE}/docs/.vitepress/dist"
          cd "$DIST"
          git init
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git status
          git commit -m "docs: publish ${GITHUB_SHA:0:7}"
          git branch -M gh-pages
          git remote add origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
          echo "OK: pushed gh-pages for ${GITHUB_REPOSITORY}"
