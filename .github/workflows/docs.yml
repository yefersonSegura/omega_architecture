# VitePress (docs/) → GitHub Actions Pages (same pattern as omega-workspace).
#
# One-time: Settings → Pages → Build and deployment → Source: **GitHub Actions**.
# Do NOT add a second workflow that uploads pages from repo root — no index.html there.
#
# If you still use “Deploy from branch → gh-pages”, that branch is no longer updated by
# this file; switch Pages to GitHub Actions or restore the git-push-to-gh-pages flow.
#
# VitePress `base` in docs/.vitepress/config.mts must be '/<repo>/' (e.g. /omega_architecture/).
name: Deploy documentation

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install & build
        working-directory: docs
        run: |
          npm ci
          npm run build

      - name: Verify dist
        run: test -f docs/.vitepress/dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
