# Builds the Omega Architecture documentation site (VitePress in docs/) and deploys to GitHub Pages.
# Same pattern as omega-workspace: https://github.com/yefersonSegura/omega_angular/blob/main/.github/workflows/docs.yml
# Do NOT add a second workflow that uploads a pages artifact from repo root — it has no index.html and will overwrite this site.
# One-time: Settings → Pages → Source: GitHub Actions. Site URL: https://<owner>.github.io/<repo>/
# VitePress `base` in docs/.vitepress/config.mts must be '/<repo>/' (match the repository name).
name: Deploy documentation

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install & build
        working-directory: docs
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
