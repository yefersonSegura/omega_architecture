# VitePress site from docs/ → GitHub Pages (same stack as omega-workspace/docs).
#
# ONE-TIME (repo owner): If deploy fails with HttpError 404 / "Creating Pages deployment failed":
#   Settings → Pages → Build and deployment → Source → select "GitHub Actions" (NOT "Deploy from a branch").
#   Until Pages is enabled this way, actions/deploy-pages cannot create a deployment.
#   Optional: Settings → Environments → github-pages — approve the environment on first run if protected.
#
# https://docs.github.com/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow
name: Deploy documentation site

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install and build VitePress
        working-directory: docs
        run: npm ci && npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
