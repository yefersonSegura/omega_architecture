# VitePress build from docs/ → push static site to branch `gh-pages`.
# Avoids actions/deploy-pages (REST "create deployment") which returns 404 unless
# Pages is configured exactly for the GitHub Actions artifact flow.
#
# ONE-TIME (repo owner):
#   1. Settings → Pages → Build and deployment → Source: "Deploy from a branch"
#      Branch: gh-pages  ·  Folder: / (root)
#   2. If the workflow cannot push: Settings → Actions → General → Workflow permissions
#      → enable "Read and write permissions" for GITHUB_TOKEN (needed to update gh-pages).
#
name: Deploy documentation site

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install and build VitePress
        working-directory: docs
        run: npm ci && npm run build

      - name: Push site to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/.vitepress/dist
          clean: true
